name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── Build Windows x64 ──────────────────────────────────────────────────────
  build-windows-x64:
    name: Build · Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: windows-x64

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri app (x64)
        run: pnpm tauri:build:x64
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload x64 installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ── Build Windows ARM64 ────────────────────────────────────────────────────
  build-windows-arm64:
    name: Build · Windows ARM64
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust stable + ARM64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: windows-arm64

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri app (ARM64)
        run: pnpm tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload ARM64 installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-installer
          path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows-x64, build-windows-arm64]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download x64 installer
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-installer
          path: release-assets/

      - name: Download ARM64 installer
        uses: actions/download-artifact@v4
        with:
          name: windows-arm64-installer
          path: release-assets/

      - name: Get version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v$(date +'%Y%m%d')-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Rename installers to include version + arch
        run: |
          cd release-assets
          for f in *.exe; do
            if echo "$f" | grep -qi "arm64"; then
              mv "$f" "Gemini-Chat-${{ steps.version.outputs.version }}-windows-arm64-setup.exe"
            else
              mv "$f" "Gemini-Chat-${{ steps.version.outputs.version }}-windows-x64-setup.exe"
            fi
          done
          ls -lh

      - name: Create source archives
        run: |
          VERSION=${{ steps.version.outputs.version }}

          zip -r "release-assets/Gemini-Chat-${VERSION}-source.zip" . \
            --exclude "*.git*" \
            --exclude "node_modules/*" \
            --exclude "src-tauri/target/*" \
            --exclude ".nuxt/*" \
            --exclude "dist/*" \
            --exclude ".output/*" \
            --exclude "release-assets/*"

          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='src-tauri/target' \
              --exclude='.nuxt' \
              --exclude='dist' \
              --exclude='.output' \
              --exclude='release-assets' \
              -czf "release-assets/Gemini-Chat-${VERSION}-source.tar.gz" .

          ls -lh release-assets/

      - name: Generate release notes
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cat << NOTES > release_notes.md
          ## Gemini Chat ${VERSION}

          A modern AI chat desktop app powered by Google Gemini — built with Nuxt 3 + Tauri 2.

          ### Downloads

          | File | Platform |
          |------|----------|
          | \`Gemini-Chat-${VERSION}-windows-x64-setup.exe\` | Windows 10/11 x64 (Intel/AMD) |
          | \`Gemini-Chat-${VERSION}-windows-arm64-setup.exe\` | Windows 11 ARM64 (Snapdragon/Surface) |

          ### Installation

          1. Download the installer for your platform above
          2. Run the \`.exe\` — installs for current user, no admin required
          3. Launch **Gemini Chat** from the Start Menu
          4. Click **Settings** and enter your [Google AI Studio API key](https://aistudio.google.com/apikey)

          ### Requirements

          - Windows 10/11 x64 or Windows 11 ARM64
          - WebView2 Runtime (built into Windows 11; [download for Windows 10](https://developer.microsoft.com/en-us/microsoft-edge/webview2/))
          - A free [Gemini API key](https://aistudio.google.com/apikey)

          > Your API key and conversations are stored locally and never sent anywhere except the Google Gemini API.
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Gemini Chat ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'dev') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}
          files: |
            release-assets/Gemini-Chat-${{ steps.version.outputs.version }}-windows-x64-setup.exe
            release-assets/Gemini-Chat-${{ steps.version.outputs.version }}-windows-arm64-setup.exe
            release-assets/Gemini-Chat-${{ steps.version.outputs.version }}-source.zip
            release-assets/Gemini-Chat-${{ steps.version.outputs.version }}-source.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}